services:
  flink-jobmanager:
    image: flink:1.20.1-scala_2.12-java17
    container_name: flink-jobmanager
    hostname: flink-jobmanager
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.bind-host: 0.0.0.0
        rest.address: flink-jobmanager
        rest.bind-address: 0.0.0.0
        taskmanager.numberOfTaskSlots: 2
        parallelism.default: 2

  flink-taskmanager-1:
    image: flink:1.20.1-scala_2.12-java17
    container_name: flink-taskmanager-1
    hostname: flink-taskmanager-1
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.bind-host: 0.0.0.0
        taskmanager.host: flink-taskmanager-1
        taskmanager.numberOfTaskSlots: 1
        parallelism.default: 2

  flink-taskmanager-2:
    image: flink:1.20.1-scala_2.12-java17
    container_name: flink-taskmanager-2
    hostname: flink-taskmanager-2
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.bind-host: 0.0.0.0
        taskmanager.host: flink-taskmanager-2
        taskmanager.numberOfTaskSlots: 1
        parallelism.default: 2
